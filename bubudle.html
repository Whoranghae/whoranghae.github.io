<div class="main">

  <nav class="navbar song-header">

        <div class="song-title-utils">

            <button type="button" class="btn btn-xs bubudle-diff-btn" data-bdiff="all">All</button>

            <button type="button" class="btn btn-xs bubudle-diff-btn" data-bdiff="hard">Hard</button>
            <button type="button" class="btn btn-xs bubudle-diff-btn" data-bdiff="insane">Insane</button>

          </div>
          <div id="bubudle-song-difficulty" class="bubudle-difficulty-toggle">
            <span class="bubudle-toggle-label">Diff:</span>
            <button type="button" class="btn btn-xs bubudle-sdiff-btn active" data-sdiff="all">All</button>
            <button type="button" class="btn btn-xs bubudle-sdiff-btn" data-sdiff="1">Normal</button>
            <button type="button" class="btn btn-xs bubudle-sdiff-btn" data-sdiff="2">Hard</button>
            <button type="button" class="btn btn-xs bubudle-sdiff-btn" data-sdiff="3">Insane</button>
            <span id="bubudle-sdiff-help" class="glyphicon glyphicon-question-sign bubudle-diff-help"></span>
          </div>
          <div class="bubudle-difficulty-toggle">
            <span class="bubudle-toggle-label">Pool:</span>

            <span id="bubudle-pool-help" class="glyphicon glyphicon-question-sign bubudle-diff-help"></span>
          </div>

      </div>

        <span class="bubudle-toggle-label">Subunit:</span>

    </div>
  </nav>

  <div id="game-area" class="container-fluid"><div class="row">

            <div class="bubudle-seek-wrap">
              <div id="bubudle-lyric-marker" class="bubudle-lyric-marker"></div>
              <input id="bubudle-seek-slider" type="range" min="0" max="1000" value="0" step="1">
            </div>
            <span id="bubudle-time" class="bubudle-time">0:00</span>
          </div>
          <div class="bubudle-volume">
            <span class="glyphicon glyphicon-volume-down" aria-hidden="true"></span>
            <input id="bubudle-volume-slider" type="range" min="0" max="100" value="30">
          </div>
        </div>
        <div class="bubudle-card-right">

          <div id="bubudle-hint-clip" class="bubudle-hint-line"></div>
          <div id="bubudle-hint-song" class="bubudle-hint-line"></div>
          <div id="bubudle-hint-theme" class="bubudle-hint-line"></div>
          <div id="bubudle-guesses" class="bubudle-guesses"></div>
        </div>

      <div id="slots">
      </div>

        <button id="bubudle-flag-singer" type="button" class="btn btn-default bubudle-flag-btn" title="Flag wrong singer assignment">&#9834; Flag Singer</button>

        <button type="button" class="btn btn-danger btn-xs bubudle-diff-pick" data-diff="3">Insane</button>
      </div>
      <div id="bubudle-singer-options" class="bubudle-flag-options" style="display:none">
        <button type="button" class="btn btn-info btn-xs" id="bubudle-singer-submit">Done</button>
        <button type="button" class="btn btn-default btn-xs" id="bubudle-singer-idk">Just Wrong</button>
      </div>
      <div id="bubudle-streak" class="bubudle-streak"></div>
    </div>
  </div></div>
